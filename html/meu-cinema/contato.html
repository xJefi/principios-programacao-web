<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>
    <form action="processa.php" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <br><br>

        <label for="select">Escolha uma opção:</label>
        <select name="select" id="select" required>
            <option value="">Selecione uma opção</option>
            <option value="sugestao">Sugestão de filme</option>
            <option value="critica">Crítica construtiva</option>]
            <option value="elogio">Elogio</option>
        </select>

        <br><br>

        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem" cols="30" rows="5" required></textarea>

        <br><br>

        <fieldset>
            <legend>Qual seu gênero preferido?</legend>

            <input type="radio" id="acao" name="genero" value="Ação" checked>
            <label for="acao">Ação</label>
            <br>
            <input type="radio" id="drama" name="genero" value="Drama">
            <label for="drama">Drama</label>
            <br>
            <input type="radio" id="suspense" name="genero" value="Suspense">
            <label for="suspense">Suspense</label>
            <br>
            <input type="radio" id="comedia" name="genero" value="Comédia">
            <label for="comedia">Comédia</label>
            <br>
            <input type="radio" id="documentario" name="genero" value="Documentário">
            <label for="documentario">Documentário</label>
        </fieldset>

        <br><br>

        <fieldset>
            <legend>Preferências de contato</legend>

            <input type="checkbox" id="dicas" name="dicas" value="yes" checked>
            <label for="dicas">Quero receber dicas por e-mail.</label>
            <br>
            <input type="checkbox" id="sorteios" name="sorteios" value="yes" checked>
            <label for="sorteios">Desejo participar de sorteios.</label>
            <br>
            <input type="checkbox" id="info" name="info" value="agree" checked>
            <label for="info">Autorizo o uso das informações.</label>
        </fieldset>

        <br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>

</html>
