<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>

<body>
    <form action="processa.php" method="post">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" required>

        <br><br>

        <label for="e-mail">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <br><br>

        <label for="select">Escolha uma opção:</label>
        <select name="select" id="select">
            <option value="duvida">Dúvida</option>
            <option value="sugestao">Sugestão</option>
            <option value="elogio">Elogio</option>
        </select>

        <br><br>

        <label for="coment">Comentário:</label>
        <textarea name="coment" id="coment" rows="4" cols="33" placeholder="Escreva sua mensagem..."
            required></textarea>

        <br><br>

        <fieldset>
            <legend> Qual seu nível de conhecimento em HTML?</legend>

            <input type="radio" name="nivel" id="iniciante" value="Iniciante" checked>
            <label for="iniciante">Iniciante</label>

            <input type="radio" name="nivel" id="intermediario" value="Intermediário">
            <label for="intermediario">Intermediário</label>

            <input type="radio" name="nivel" id="avancado" value="Avançado">
            <label for="avancado">Avançado</label>

        </fieldset>

        <br><br>

        <fieldset>
            <legend>Preferências</legend>

            <input type="checkbox" name="novidades" id="novidades" value="yes">
            <label for="novidades">Quero receber novidades por e-mail.</label>

            <br>

            <input type="checkbox" name="testes" id="testes" value="yes">
            <label for="testes">Desejo participar de testes beta.</label>

            <br>

            <input type="checkbox" name="dados" id="agree" value="agree">
            <label for="agree">Autorizo o uso dos dados.</label>
            
        </fieldset>

        <br><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

    </form>

</body>

</html>
