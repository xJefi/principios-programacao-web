<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <title>Tabela</title>

            </tr>

                <td rowspan="2" align="center">Português</td>
                <td align="center">Religião</td>
                <td rowspan="2" align="center">Ciências</td>
            </tr>
            <tr>
                <td align="center">Educação Física</td>
            </tr>

                <td colspan="6" bgcolor="lightblue"> &nbsp; </td>

            </tr>
            <tr>
                <td rowspan="2" align="center">9:45h até 11:30h</td>
                <td rowspan="2" align="center">Português</td>
                <td align="center">Educação Física</td>
                <td rowspan="2" align="center">Matemática</td>
                <td rowspan="2" align="center">História</td>
                <td rowspan="2" align="center">Geografia</td>
            </tr>

            <tr>
                <td align="center">Artes</td>
            </tr>

            </tr>
        </tbody>

    </table>


</body>

</html>
